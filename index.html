<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCED Service Request</title>

    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%2326D041' d='M12 2.02c-5.51 0-9.98 4.47-9.98 9.98s4.47 9.98 9.98 9.98s9.98-4.47 9.98-9.98S17.51 2.02 12 2.02'/%3E%3Cpath fill='%230a0a0b' d='M11.48 17.88v-4.14H8.82c-.37 0-.62-.4-.44-.73l3.68-7.17c.23-.47.94-.3.94.23v4.19h2.54c.37 0 .61.39.45.72l-3.56 7.12c-.24.48-.95.31-.95-.22'/%3E%3C/svg%3E">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/css">
        @font-face {
            font-family: 'Instrument Sans';
            src: url('./assets/fonts/InstrumentSans-VariableFont_wdth,wght.ttf') format('truetype');
            font-weight: 100 900;
            font-stretch: 75% 100%;
            font-display: swap;
        }

        @font-face {
            font-family: 'Red Hat Display';
            src: url('./assets/fonts/RedHatDisplay-VariableFont_wght.ttf') format('truetype');
            font-weight: 100 900;
            font-display: swap;
        }
    </style>
</head>

<body class="bg-[#fafaf7] text-[#0a0a0b] min-h-screen font-['Instrument_Sans',sans-serif]">
    <div class="p-2.5 border-b border-gray-300 mb-6 not-md:mt-4">
        <div class="max-w-3xl mx-auto flex items-center space-x-2">
            <!-- <img src="./assets/images/KNUST logo.png" alt="KNUST Crest" class="w-16 h-20 md:w-22 md:h-26"> -->
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24">
                <path fill="#26D041"
                    d="M12 2.02c-5.51 0-9.98 4.47-9.98 9.98s4.47 9.98 9.98 9.98s9.98-4.47 9.98-9.98S17.51 2.02 12 2.02" />
                <path fill="#0a0a0b"
                    d="M11.48 17.88v-4.14H8.82c-.37 0-.62-.4-.44-.73l3.68-7.17c.23-.47.94-.3.94.23v4.19h2.54c.37 0 .61.39.45.72l-3.56 7.12c-.24.48-.95.31-.95-.22" />
            </svg>

            <h1 class="font-['Red_Hat_Display',sans-serif] font-bold md:text-lg">
                KNUST Central Energy Database
            </h1>
        </div>
    </div>

    <div class="max-w-3xl mx-auto px-4 space-y-6 not-md:mt-4">
        <div class="text-center">
            <h1 class="font-['Red_Hat_Display',sans-serif] font-extrabold text-2xl md:text-3xl pt-4">
                Service Request Form
            </h1>

            <p class="text-center font-light not-md:text-sm text-[#0a0a0b9e]">Fill out the form below to submit a new
                service
                request.</p>
        </div>

        <p class="font-light text-red-600 not-md:text-sm">Do NOT use this form for emergencies! Instead, refer to the
            information
            <span class="underline underline-offset-2 hover:cursor-pointer">here</span>.
        </p>

        <div id="formContainer">
            <form class="space-y-6">
                <div class="flex flex-col space-y-1">
                    <div class="flex items-center space-x-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
                            <g fill="transparent" fill-opacity="0" stroke="currentColor" stroke-linecap="round"
                                stroke-linejoin="round" stroke-width="2">
                                <path stroke-dasharray="64" stroke-dashoffset="64"
                                    d="M12 3c4.97 0 9 4.03 9 9c0 4.97 -4.03 9 -9 9c-4.97 0 -9 -4.03 -9 -9c0 -4.97 4.03 -9 9 -9Z">
                                    <animate fill="freeze" attributeName="stroke-dashoffset" dur="0.6s" values="64;0" />
                                </path>
                                <path fill="none" stroke-dasharray="8" stroke-dashoffset="8" d="M12 7v6">
                                    <animate fill="freeze" attributeName="stroke-dashoffset" begin="0.6s" dur="0.2s"
                                        values="8;0" />
                                </path>
                                <path fill="none" stroke-dasharray="2" stroke-dashoffset="2" d="M12 17v0.01">
                                    <animate fill="freeze" attributeName="stroke-dashoffset" begin="0.8s" dur="0.2s"
                                        values="2;0" />
                                </path>
                                <animate fill="freeze" attributeName="fill-opacity" begin="1.1s" dur="0.15s"
                                    values="0;0.3" />
                            </g>
                        </svg>

                        <label for="issue" class="font-['Red_Hat_Display',sans-serif] font-[600]">Issue</label>
                    </div>

                    <input type="text" id="issue" placeholder="Faulty A/C"
                        class="font-light p-2 bg-white rounded-md border-dashed border-2 border-[#0a0a0b0f] focus:outline-none placeholder:font-light"
                        required>
                </div>

                <div class="flex flex-col space-y-2">
                    <div class="flex items-center space-x-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                            class="shrink-0">
                            <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                                stroke-width="2">
                                <path fill="transparent" fill-opacity="0" stroke-dasharray="64" stroke-dashoffset="64"
                                    d="M20 5v14c0 0.55 -0.45 1 -1 1h-14c-0.55 0 -1 -0.45 -1 -1v-14c0 -0.55 0.45 -1 1 -1h14c0.55 0 1 0.45 1 1Z">
                                    <animate fill="freeze" attributeName="fill-opacity" begin="1.3s" dur="0.15s"
                                        values="0;0.3" />
                                    <animate fill="freeze" attributeName="stroke-dashoffset" dur="0.6s" values="64;0" />
                                </path>
                                <path stroke-dasharray="10" stroke-dashoffset="10" d="M8 8h8">
                                    <animate fill="freeze" attributeName="stroke-dashoffset" begin="0.7s" dur="0.2s"
                                        values="10;0" />
                                </path>
                                <path stroke-dasharray="10" stroke-dashoffset="10" d="M8 12h8">
                                    <animate fill="freeze" attributeName="stroke-dashoffset" begin="0.9s" dur="0.2s"
                                        values="10;0" />
                                </path>
                                <path stroke-dasharray="6" stroke-dashoffset="6" d="M8 16h5">
                                    <animate fill="freeze" attributeName="stroke-dashoffset" begin="1.1s" dur="0.2s"
                                        values="6;0" />
                                </path>
                            </g>
                        </svg>

                        <label for="description" class="font-['Red_Hat_Display',sans-serif] font-[600]">Description -
                            please provide as much detail as possible </label>
                    </div>


                    <textarea id="description" placeholder="Describe the issue"
                        class="font-light min-h-28 p-2 bg-white rounded-md border-dashed border-2 border-[#0a0a0b0f] focus:outline-none placeholder:font-light"
                        required></textarea>
                </div>

                <div class="flex flex-col space-y-2">
                    <div class="flex items-center space-x-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
                            <circle cx="12" cy="9" r="2.5" fill="currentColor" fill-opacity="0">
                                <animate fill="freeze" attributeName="fill-opacity" begin="0.85s" dur="0.15s"
                                    values="0;1" />
                            </circle>
                            <path fill="transparent" fill-opacity="0" stroke="currentColor" stroke-dasharray="48"
                                stroke-dashoffset="48" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 20.5c0 0 -6 -7 -6 -11.5c0 -3.31 2.69 -6 6 -6c3.31 0 6 2.69 6 6c0 4.5 -6 11.5 -6 11.5Z">
                                <animate fill="freeze" attributeName="fill-opacity" begin="0.7s" dur="0.15s"
                                    values="0;0.3" />
                                <animate fill="freeze" attributeName="stroke-dashoffset" dur="0.6s" values="48;0" />
                            </path>
                        </svg>

                        <label for="location" class="font-['Red_Hat_Display',sans-serif] font-[600]">Location</label>
                    </div>

                    <input id="location" placeholder="Petroleum Building Room 101"
                        class="font-light p-2 bg-white rounded-md border-dashed border-2 border-[#0a0a0b0f] focus:outline-none placeholder:font-light"
                        required>
                </div>

                <div class="flex space-x-2 not-md:flex-col not-md:space-x-0 not-md:space-y-4">
                    <div class="space-y-2 w-full md:w-1/2">
                        <div class="flex items-center space-x-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
                                <g fill="none" stroke="currentColor" stroke-dasharray="28" stroke-dashoffset="28"
                                    stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                                    <path d="M4 21v-1c0 -3.31 2.69 -6 6 -6h4c3.31 0 6 2.69 6 6v1">
                                        <animate fill="freeze" attributeName="stroke-dashoffset" dur="0.4s"
                                            values="28;0" />
                                    </path>
                                    <path
                                        d="M12 11c-2.21 0 -4 -1.79 -4 -4c0 -2.21 1.79 -4 4 -4c2.21 0 4 1.79 4 4c0 2.21 -1.79 4 -4 4Z">
                                        <animate fill="freeze" attributeName="stroke-dashoffset" begin="0.4s" dur="0.4s"
                                            values="28;0" />
                                    </path>
                                </g>
                            </svg>

                            <label for="reporter" class="font-['Red_Hat_Display',sans-serif] font-[600]">Your
                                Name</label>
                        </div>

                        <input id="reporter" placeholder="John Doe"
                            class="w-full font-light p-2 bg-white rounded-md border-dashed border-2 border-[#0a0a0b0f] focus:outline-none placeholder:font-light"
                            required>
                    </div>

                    <div class="space-y-2 w-full md:w-1/2">
                        <div class="flex items-center space-x-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
                                <path fill="none" stroke="currentColor" stroke-dasharray="64" stroke-dashoffset="64"
                                    stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M8 3c0.5 0 2.5 4.5 2.5 5c0 1 -1.5 2 -2 3c-0.5 1 0.5 2 1.5 3c0.39 0.39 2 2 3 1.5c1 -0.5 2 -2 3 -2c0.5 0 5 2 5 2.5c0 2 -1.5 3.5 -3 4c-1.5 0.5 -2.5 0.5 -4.5 0c-2 -0.5 -3.5 -1 -6 -3.5c-2.5 -2.5 -3 -4 -3.5 -6c-0.5 -2 -0.5 -3 0 -4.5c0.5 -1.5 2 -3 4 -3Z">
                                    <animate fill="freeze" attributeName="stroke-dashoffset" dur="0.6s" values="64;0" />
                                </path>
                            </svg>

                            <label for="reporter_contact"
                                class="font-['Red_Hat_Display',sans-serif] font-[600]">Contact</label>
                        </div>

                        <input id="reporter_contact" placeholder="0548666090" type="tel"
                            class="w-full font-light p-2 bg-white rounded-md border-dashed border-2 border-[#0a0a0b0f] focus:outline-none placeholder:font-light"
                            required>
                    </div>
                </div>

                <div>
                    <p id="errorMsg"
                        class="text-red-600 text-center mb-2 opacity-0 -translate-y-2 transition-all duration-300">
                        Failed to submit request. Try again.
                    </p>

                    <button id="submitBtn" type="submit"
                        class="w-full bg-[#26D041] py-2 mb-8 rounded-md hover:bg-[#3fe85a] flex items-center justify-center gap-2 transition-all duration-150">

                        <span id="btnText" class="font-[500]">Submit Request</span>

                        <span id="spinner"
                            class="hidden h-4 w-4 my-1 animate-spin rounded-full border-2 border-black border-t-transparent"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>

<script>
    const form = document.querySelector("form");
    const btn = document.getElementById("submitBtn");
    const spinner = document.getElementById("spinner");
    const btnText = document.getElementById("btnText");
    const errorText = document.getElementById("errorMsg");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        spinner.classList.remove("hidden");
        btnText.classList.add("hidden");
        btn.disabled = true;

        const data = {
            issue: document.getElementById("issue").value,
            description: document.getElementById("description").value,
            location: document.getElementById("location").value,
            reporter: document.getElementById("reporter").value,
            reporter_contact: document.getElementById("reporter_contact").value
        };

        try {
            errorText.classList.add("opacity-0", "-translate-y-2");
            errorText.classList.remove("opacity-100", "translate-y-0");

            const res = await fetch("https://kced-backend.onrender.com/api/v1/service-requests", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            if (!res.ok) {
                throw new Error("Request failed");
            }

            document.getElementById("formContainer").innerHTML = `
                <div
                    class="bg-white p-10 rounded-xl border-dashed border-2 border-[#0a0a0b0f] text-center space-y-4 animate-in fade-in zoom-in duration-300">
                    <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-[#E5FBE9]">
                        <svg class="h-10 w-10 text-[#26D041]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7">
                            </path>
                        </svg>
                    </div>
                    <div class="space-y-2">
                        <h2 class="text-2xl font-[800] text-gray-800 font-['Red_Hat_Display',sans-serif]">Request
                            Submitted!</h2>
                        <p class="text-gray-600 font-light">
                            Thank you. Your service request has been submitted.
                            Our maintenance team will review it shortly.
                        </p>
                    </div>
                    <button onclick="window.location.reload()"
                        class="mt-4 text-sm font-medium text-[#26D041] hover:text-[#3fe85a] underline underline-offset-4">
                        Submit another request
                    </button>
                </div>
            `;

        } catch (err) {
            console.error(err);

            errorText.classList.remove("opacity-0", "-translate-y-2");
            errorText.classList.add("opacity-100", "translate-y-0");

            spinner.classList.add("hidden");
            btnText.classList.remove("hidden");
            btn.disabled = false;
            errorText.classList.remove("hidden");
            errorText.classList.add("opacity-100", "translate-y-0");
        }
    });
</script>

</html>
