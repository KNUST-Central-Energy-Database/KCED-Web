<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCED Service Request</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 min-h-screen">

    <div class="max-w-6xl mx-auto p-4">

        <div class="flex items-center space-x-4">
            <img src="./images/KNUST logo.png" alt="KNUST Crest" class="w-16 h-20 md:w-22 md:h-26">
            <h1 class="font-bold text-xl md:text-2xl pt-4">KNUST Central Energy Database</h1>
        </div>

        <div class="max-w-4xl mx-auto px-4 space-y-6 mt-8">
            <div id="headerContent" class="text-center">
                <h1 class="font-bold text-2xl md:text-3xl pt-4">Service Request Form</h1>
                <p class="text-center font-light not-md:text-sm">Fill out the form below to submit a new service
                    request.</p>
            </div>

            <div id="formContainer" class="space-y-6">
                <p class="font-light text-red-700">Do NOT use this form for emergencies! Instead, refer to the
                    information
                    <span class="underline underline-offset-2 hover:cursor-pointer">here</span>.
                </p>

                <form class="space-y-6">
                    <div class="flex flex-col space-y-1">
                        <label for="issue" class="font-medium">Issue</label>
                        <input type="text" id="issue" placeholder="e.g. Faulty A/C"
                            class="font-light p-2 outline-1 outline-gray-300 bg-slate-50 rounded-md focus:outline-2 focus:outline-black placeholder:font-light"
                            required>
                    </div>

                    <div class="flex flex-col space-y-2">
                        <label for="description" class="font-medium">Description - please provide as much detail as
                            possible</label>
                        <textarea id="description" placeholder="Describe the issue"
                            class="font-light min-h-28 p-2 outline-1 outline-gray-300 bg-slate-50 rounded-md focus:outline-2 focus:outline-black placeholder:font-light"
                            required></textarea>
                    </div>

                    <div class="flex flex-col space-y-2">
                        <label for="location" class="font-medium">Location</label>
                        <input id="location" placeholder="e.g. Petroleum Building Room 101"
                            class="font-light p-2 outline-1 outline-gray-300 bg-slate-50 rounded-md focus:outline-2 focus:outline-black placeholder:font-light"
                            required>
                    </div>

                    <div>
                        <button id="submitBtn" type="submit"
                            class="w-full bg-green-600 text-white py-3 px-4 rounded-md hover:bg-green-700 transition-colors flex items-center justify-center gap-2">
                            <span id="btnText">Submit Request</span>
                            <span id="spinner"
                                class="hidden h-5 w-5 animate-spin rounded-full border-2 border-white border-t-transparent"></span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>

<script>
    const form = document.querySelector("form");
    const btn = document.getElementById("submitBtn");
    const spinner = document.getElementById("spinner");
    const btnText = document.getElementById("btnText");
    const formContainer = document.getElementById("formContainer");
    const headerContent = document.getElementById("headerContent");

    form.addEventListener("submit", (e) => {
        e.preventDefault();

        // 1. Enter Loading State
        spinner.classList.remove("hidden");
        btnText.innerText = "Processing...";
        btn.disabled = true;
        btn.classList.replace("bg-green-600", "bg-green-400");

        // 2. Timeout to simulate "Submission"
        setTimeout(() => {
            showSuccessModal();
        }, 1500);
    });

    function showSuccessModal() {
        // Hide the original header
        headerContent.classList.add("hidden");

        // Inject the Success Modal into formContainer
        formContainer.innerHTML = `
            <div class="bg-white p-10 rounded-xl shadow-sm border border-gray-100 text-center space-y-4 animate-in fade-in zoom-in duration-300">
                <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100">
                    <svg class="h-10 w-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
                <div class="space-y-2">
                    <h2 class="text-2xl font-bold text-gray-800">Request Submitted!</h2>
                    <p class="text-gray-600 font-light">
                        Thank you. Your service request has been logged in the Central Energy Database. 
                        Our maintenance team will review it shortly.
                    </p>
                </div>
                <button onclick="window.location.reload()" class="mt-4 text-sm font-medium text-green-600 hover:text-green-700 underline underline-offset-4">
                    Submit another request
                </button>
            </div>
        `;
    }
</script>

</html>
